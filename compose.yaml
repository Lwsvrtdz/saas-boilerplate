services:
  laravel.test:
    build:
      context: ./vendor/laravel/sail/runtimes/8.3
      dockerfile: Dockerfile
      args:
        WWWGROUP: "${WWWGROUP}"
    image: sail-8.3/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8000}:80"
    environment:
      WWWUSER: "${WWWUSER}"
      LARAVEL_SAIL: 1
      XDEBUG_MODE: "${SAIL_XDEBUG_MODE:-off}"
      XDEBUG_CONFIG: "${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}"
      APP_ENV: "${APP_ENV:-local}"
    volumes:
      - ".:/var/www/html"
    depends_on:
      - mysql
    networks:
      - sail

  mysql:
    image: "mysql:8.4"
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ALLOW_EMPTY_PASSWORD: 0
    volumes:
      - "sail-mysql:/var/lib/mysql"
    networks:
      - sail
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - "-p${DB_PASSWORD}"
      retries: 3
      timeout: 5s

  frontend:
    image: "node:22-alpine"
    working_dir: /var/www/html/frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NUXT_PUBLIC_API_BASE_URL: "http://localhost:${APP_PORT:-8000}/api"
      HOST: "0.0.0.0"
      PORT: "3000"
    volumes:
      - ".:/var/www/html"
      - "sail-frontend-node-modules:/var/www/html/frontend/node_modules"
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm install; fi && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - laravel.test
    networks:
      - sail

networks:
  sail:
    driver: bridge

volumes:
  sail-mysql:
    driver: local
  sail-frontend-node-modules:
    driver: local
